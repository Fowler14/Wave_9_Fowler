<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>DOM + Events Homework –</title>
    <link rel="stylesheet" href="homework.css" />
  </head>
  <body>
    <main class="page">
      <section class="card" id="eventCard">
        <h1 id="cardTitle">Dom + Events</h1>
        <p class="description" id="cardDescription">Reactive webapage where clicking makes something happen!!</p>
        <div class="button-row">
          <button class="btn" id="changeTitleBtn">Change Title</button>
          <button class="btn ghost" id="toggleHighlightBtn">Toggle Highlight</button>
          <button class="btn small" id="incrementBtn">+1</button>
        </div>
        <div class="counter-section">
          <h3>This is the counter</h3>
          <p>Current Count: <span id="counterValue">0</span></p>
        </div>
        <div class="live-preview-section">
          <label for="previewInput">Preview Input: </label>
          <input type="text" id="previewInput">
          <p><span id="previewText"></span></p>
        </div>
      </section>
    </main>
    <script src="homework.js"></script>
  </body>
</html>
